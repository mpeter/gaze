name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    name: Unit + Integration Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: ["1.24", "1.25"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -short -timeout 15m -coverprofile=coverage.out ./...

      - name: Gaze threshold check
        if: matrix.go-version == '1.24'
        run: |
          go build -o gaze ./cmd/gaze
          ./gaze report ./... \
            --format=json \
            --coverprofile=coverage.out \
            --max-crapload=38 \
            --max-gaze-crapload=5 \
            --min-contract-coverage=8 \
            > /dev/null

      - name: Install OpenCode
        if: matrix.go-version == '1.24' && github.event_name == 'push'
        run: npm install -g opencode-ai@1.2.26

      - name: Gaze quality report
        if: matrix.go-version == '1.24' && github.event_name == 'push'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          ./gaze report ./... \
            --ai=opencode \
            --model=opencode/claude-sonnet-4-6 \
            --coverprofile=coverage.out \
            --max-crapload=38 \
            --max-gaze-crapload=5 \
            --min-contract-coverage=8

  e2e:
    name: E2E Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24", "1.25"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Self-Check Tests
        run: go test -race -count=1 -run 'TestRunSelfCheck' -timeout 30m ./cmd/gaze/...
